name: Framework CI (Multi-project)

on:
  push:
  pull_request:

jobs:
  framework-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required framework files exist
        run: |
          test -d .ai-office/workflows
          test -d .ai-office/rules
          test -d .ai-office/templates

      - name: Required workflows are not empty
        run: |
          files=(
            ".ai-office/workflows/pipeline.md"
            ".ai-office/workflows/role-product.md"
            ".ai-office/workflows/role-architect.md"
            ".ai-office/workflows/role-planner.md"
            ".ai-office/workflows/role-developer.md"
            ".ai-office/workflows/role-qa.md"
            ".ai-office/workflows/role-creative.md"
            ".ai-office/workflows/role-security.md"
            ".ai-office/workflows/role-ops.md"
            ".ai-office/workflows/office-operations.md"
            ".ai-office/workflows/create-project.md"
            ".ai-office/workflows/develop-feature.md"
            ".ai-office/workflows/import-project.md"
          )
          for f in "${files[@]}"; do
            test -s "$f" || (echo "Empty workflow: $f" && exit 1)
          done

      - name: Required templates are not empty
        run: |
          files=(
            ".ai-office/templates/prd.md"
            ".ai-office/templates/adr.md"
            ".ai-office/templates/qa-checklist.md"
            ".ai-office/templates/runbook-plan.md"
            ".ai-office/templates/runbook-tasks.md"
          )
          for f in "${files[@]}"; do
            test -s "$f" || (echo "Empty template: $f" && exit 1)
          done

      - name: Multi-sector review skill exists
        run: |
          test -s ".ai-office/skills/review-document-multisector.md" || (echo "Missing skill: review-document-multisector" && exit 1)

      - name: Templates include mandatory multi-sector review section
        run: |
          files=(
            ".ai-office/templates/prd.md"
            ".ai-office/templates/adr.md"
            ".ai-office/templates/runbook-plan.md"
            ".ai-office/templates/runbook-tasks.md"
            ".ai-office/templates/qa-checklist.md"
          )
          for f in "${files[@]}"; do
            grep -Fq "## Multi-sector review (mandatory)" "$f" || (echo "Missing multi-sector section in: $f" && exit 1)
          done

      - name: Workflows enforce multi-sector review gate
        run: |
          files=(
            ".ai-office/workflows/pipeline.md"
            ".ai-office/workflows/role-product.md"
            ".ai-office/workflows/role-architect.md"
            ".ai-office/workflows/role-planner.md"
            ".ai-office/workflows/role-developer.md"
            ".ai-office/workflows/role-qa.md"
            ".ai-office/workflows/role-creative.md"
            ".ai-office/workflows/role-security.md"
            ".ai-office/workflows/role-ops.md"
            ".ai-office/workflows/office-operations.md"
            ".ai-office/workflows/create-project.md"
            ".ai-office/workflows/develop-feature.md"
            ".ai-office/workflows/import-project.md"
          )
          for f in "${files[@]}"; do
            grep -Fq "review-document-multisector" "$f" || (echo "Missing review gate in workflow: $f" && exit 1)
          done

      - name: Skills are not empty
        run: |
          for f in .ai-office/skills/*.md; do
            test -s "$f" || (echo "Empty skill: $f" && exit 1)
          done
